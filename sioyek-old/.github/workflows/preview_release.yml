
name: Preview Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    needs: [build-mac, build-mac-arm, build-mac-native, build-linux, build-windows]

    steps:
    - uses: actions/checkout@v4
    - name: download artifacts
      uses: actions/download-artifact@v4

    - name: Delete existing nightly release
      if: github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release delete nightly --yes --cleanup-tag -R ${{ github.repository }} || true

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        prerelease: true
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
        name: ${{ github.ref_type == 'tag' && github.ref_name || 'Nightly Build' }}
        generate_release_notes: true
        files: |
          ./mac-uploads/sioyek-release-mac.zip
          ./mac-arm-uploads/sioyek-release-mac-arm.zip
          ./mac-native-uploads/sioyek-release-mac-native.zip
          ./linux-uploads/sioyek-release-linux.zip
          ./windows-uploads/sioyek-release-windows.zip

  build-linux:

    runs-on: ubuntu-22.04

    steps:
    - name: Set up GCC 12
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-12 g++-12

    - uses: actions/checkout@v4
      with:
            submodules: 'recursive'

    - name: Install dependencies
      run: sudo apt install libharfbuzz-dev libxrandr-dev libxi-dev libglu1-mesa-dev fuse libxcb-cursor0 libspeechd2
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.2'
        modules: 'all'
        cache: true

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}

      run: MAKE_PARALLEL=$(nproc) ./build_and_release.sh
      env:
        CC:   gcc-12
        CXX:  g++-12
    - name: upload linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-uploads
        path: sioyek-release-linux.zip

  build-windows:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
            submodules: 'recursive'
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.2'
        modules: 'all'
        cache: true

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Add msvc-dev-cmd
      uses: ilammy/msvc-dev-cmd@v1
      
      
    - name: Build Sioyek
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: .\build_windows.bat non_portable
      
    - name: upload windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-uploads
        path: sioyek-release-windows.zip
        
  build-mac:

    runs-on: macos-14

    steps:

    - uses: actions/checkout@v4
      with:
            submodules: 'recursive'

    - name: Cache Homebrew packages
      uses: actions/cache@v4
      env:
        cache-name: homebrew
      with:
        path: ~/Library/Caches/Homebrew
        key: ${{ runner.os }}-intel-build-${{ env.cache-name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-intel-build-${{ env.cache-name }}-
          ${{ runner.os }}-intel-build-
          ${{ runner.os }}-intel-

    - name: Install dependencies
      run:  brew install freeglut mesa harfbuzz 
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.2'
        modules: 'all'
        cache: true

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        chmod +x build_mac.sh
        MAKE_PARALLEL=$(sysctl -n hw.logicalcpu) ./build_mac.sh
        
    - name: upload mac artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-uploads
        path: sioyek-release-mac.zip

  build-mac-arm:

    runs-on: macos-14

    steps:

    - uses: actions/checkout@v4
      with:
            submodules: 'recursive'

    - name: Cache Homebrew packages
      uses: actions/cache@v4
      env:
        cache-name: homebrew
      with:
        path: ~/Library/Caches/Homebrew
        key: ${{ runner.os }}-arm-build-${{ env.cache-name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-arm-build-${{ env.cache-name }}-
          ${{ runner.os }}-arm-build-
          ${{ runner.os }}-arm-

    - name: Install dependencies
      run:  brew install freeglut mesa harfbuzz 
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.2'
        modules: 'all'
        cache: true

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        chmod +x build_mac.sh
        MAKE_PARALLEL=$(sysctl -n hw.logicalcpu) ./build_mac.sh
        mv sioyek-release-mac.zip sioyek-release-mac-arm.zip
        
    - name: upload mac artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-arm-uploads
        path: sioyek-release-mac-arm.zip

  build-mac-native:

    runs-on: macos-14

    steps:

    - uses: actions/checkout@v4

    - name: Build native Swift app
      run: |
        chmod +x build_mac_native.sh
        ./build_mac_native.sh

    - name: Create release zip
      run: |
        cd macos-native
        zip -r ../sioyek-release-mac-native.zip build/sioyek-native.dmg

    - name: upload mac native artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-native-uploads
        path: sioyek-release-mac-native.zip
