name: Build and Release DMG

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release archive
        run: |
          xcodebuild archive \
            -project Lector.xcodeproj \
            -scheme Lector \
            -configuration Release \
            -archivePath ${{ runner.temp }}/Lector.xcarchive \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app from archive
        run: |
          cp -R "${{ runner.temp }}/Lector.xcarchive/Products/Applications/Lector.app" \
                "${{ runner.temp }}/Lector.app"

      - name: Ad-hoc sign the app
        # Ad-hoc signing produces a valid signature so macOS shows
        # "unidentified developer" (bypassable) instead of "damaged".
        run: |
          codesign --deep --force --sign - \
            "${{ runner.temp }}/Lector.app"

      - name: Create DMG
        run: |
          DMG_DIR="${{ runner.temp }}/dmg-contents"
          mkdir -p "$DMG_DIR"
          cp -R "${{ runner.temp }}/Lector.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create \
            -volname "Lector" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "${{ runner.temp }}/Lector.dmg"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/Lector.dmg

      - name: Update Homebrew tap
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHA=$(shasum -a 256 "${{ runner.temp }}/Lector.dmg" | awk '{print $1}')

          git clone "https://x-access-token:${GH_PAT}@github.com/herbertwxin/homebrew-lector.git" /tmp/tap

          # Update version and sha256 in the cask formula
          cat > /tmp/update_cask.py << 'PYEOF'
          import re, os
          version = os.environ['CASK_VERSION']
          sha     = os.environ['CASK_SHA']
          path    = '/tmp/tap/Casks/lector.rb'
          with open(path) as f:
              content = f.read()
          content = re.sub(r'version "[^"]*"', f'version "{version}"', content)
          content = re.sub(r'sha256 "[^"]*"',  f'sha256 "{sha}"',     content)
          with open(path, 'w') as f:
              f.write(content)
          PYEOF

          CASK_VERSION="$VERSION" CASK_SHA="$SHA" python3 /tmp/update_cask.py

          cd /tmp/tap
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Casks/lector.rb
          git commit -m "Update Lector to ${VERSION}"
          git push
