name: Lector
options:
  bundleIdPrefix: com.lector
  deploymentTarget:
    macOS: "14.0"
targets:
  Lector:
    type: application
    platform: macOS
    sources: [Lector]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lector.app
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        OTHER_LDFLAGS: "-lsqlite3"
        INFOPLIST_FILE: Lector/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lector/Resources/Lector.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: PDFKit.framework
